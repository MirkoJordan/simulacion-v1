name: Resolve Bets Manual

on:
  workflow_dispatch: # Permite la ejecución manual desde la pestaña Actions en GitHub

permissions:
  contents: write

jobs:
  resolve-bets:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Resolve bets manually
      run: python src/resolve_bets_now.py

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add docs/data/simulation_state.json
        git diff-index --quiet HEAD || (git commit -m "Resolución Manual de Apuestas: $(date +'%Y-%m-%d')" && git push)
