name: Simulation

on:
  schedule:
    # Se ejecuta a las 04:00 UTC todos los días.
    # En verano (junio), 04:00 UTC equivale a:
    # - 06:00 AM en Madrid (UTC+2)
    # - 05:00 AM en Londres (UTC+1)
    - cron: '0 4 * * *'
  workflow_dispatch: # Permite ejecutar el bot manualmente desde el panel de GitHub

permissions:
  contents: write

jobs:
  run-simulation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install xgboost pandas numpy requests scipy

    - name: Run daily simulation
      run: python src/run_simulation.py

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add docs/data/simulation_state.json
        # Solo hace commit si hay cambios en el archivo de estado
        git diff-index --quiet HEAD || (git commit -m "Simulación Diaria: $(date +'%Y-%m-%d')" && git push)
