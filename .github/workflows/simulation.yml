name: Simulation

on:
  workflow_dispatch: # Permite ejecutar el bot mediante API externa o manualmente


permissions:
  contents: write

jobs:
  run-simulation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install xgboost pandas numpy requests scipy scikit-learn

    - name: Run daily simulation V1
      run: python src/run_simulation.py

    - name: Run daily simulation V2
      run: python simulacion-v2/src/run_simulation.py

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add docs/data/simulation_state.json
        git add docs/simulacion-v2/data/simulation_state.json
        # Solo hace commit si hay cambios en los archivos de estado
        git diff-index --quiet HEAD || (git commit -m "Simulación Diaria V1 y V2: $(date +'%Y-%m-%d')" && git push)
